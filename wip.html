<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIP | Digital Garden</title>
    <link rel="stylesheet" href="style.css">
    <script>
        const savedTheme = localStorage.getItem('theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
</head>
<body>
    <div style="position: absolute; top: 2rem; right: 2rem;">
        <button id="theme-toggle">☕ Light Mode</button>
    </div>
    <main style="padding-top: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;">
        <section style="min-height: auto; padding: 0; border: none; text-align: center;">
            <div style="font-size: 6rem; margin-bottom: 2rem; animation: bounce 2s infinite;">🪴</div>
            <span class="accent-highlight">Tending the Garden</span>
            <h1 class="intro-greeting" style="font-size: 3rem;">Work in Progress</h1>
            <p class="intro-subtitle" style="margin-top: 1rem;">I'm currently planting new seeds and watering the code in this corner of the site. Grab a cup of tea and check back a little later!</p>
            <a href="index.html" class="back-link">&larr; Back to safety</a>
        </section>
    </main>
    <script src="script.js"></script>
    <style>@keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }</style>
</body>
</html>
