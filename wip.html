<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work in Progress | Manabesu</title>
    <!-- Link to your shared aesthetic CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- ANTI-FLASHBANG SCRIPT -->
    <script>
        const savedTheme = localStorage.getItem('theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
</head>
<body>

    <!-- Floating Theme Toggle pinned to the top right -->
    <div style="position: absolute; top: 2rem; right: 2rem;">
        <button id="theme-toggle">☕ Light Mode</button>
    </div>

    <!-- Overriding the global 100px navbar padding and locking height to the screen -->
    <main style="padding-top: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;">
        
        <!-- Canceling the default #home padding so it doesn't push past the screen -->
        <section id="home" style="min-height: auto; padding: 0; border: none;">
            <div>
                <!-- Utilizing the intro-greeting class to make the emoji massive -->
                <div class="intro-greeting">🪴</div>
                
                <span class="accent-highlight">Tending the Garden</span>
                <h1 class="intro-greeting">Work in Progress</h1>
                
                <p class="intro-subtitle">
                    I'm currently planting new seeds and watering the code in this corner of the site. Grab a cup of tea and check back a little later!
                </p>

                <!-- Utilizing the back-link class from your blog template for the return link -->
                <a href="index.html" class="back-link">&larr; Back to safety</a>
            </div>
        </section>

    </main>

    <!-- Link to your shared aesthetic JS -->
    <script src="script.js"></script>
</body>
</html>
